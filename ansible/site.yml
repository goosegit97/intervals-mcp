---
# Full provisioning of the intervals-mcp Debian 12 box. Run:
#   ansible-galaxy collection install -r requirements.yml -p collections
#   ansible-playbook site.yml
#
# Order matters: base setup first, then DevSec hardening, then Caddy (the only
# public listener) and the localhost-bound intervals service. Re-running must be
# idempotent.
- name: Provision and harden the intervals-mcp box
  hosts: intervals_mcp
  become: true

  pre_tasks:
    - name: Confirm we are on Debian 12 (bookworm)
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == 'Debian'
          - ansible_facts['distribution_major_version'] == '12'
        fail_msg: "This playbook targets Debian 12 (bookworm) only."
      tags: [always]

  roles:
    # 1. Base: deploy user + SSH key, apt upgrade, core packages, auto-upgrades.
    - role: base
      tags: [base]

    # 2. DevSec OS + SSH hardening (before any service).
    - role: devsec.hardening.os_hardening
      tags: [hardening, os]
    - role: devsec.hardening.ssh_hardening
      tags: [hardening, ssh]

    # 3. Transferable sysctl drop-in + fail2ban + ufw.
    - role: hardening
      tags: [hardening]
    - role: firewall
      tags: [firewall]

    # 4. Caddy — the only public listener (80/443, TLS).
    - role: caddy
      tags: [caddy]

    # 5. Application service (binary + systemd unit + EnvironmentFile).
    - role: app
      tags: [app]

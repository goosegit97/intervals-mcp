# Ansible configuration for provisioning the intervals_mcp Debian 12 VPS.
[defaults]
inventory = inventory.ini
roles_path = roles
collections_path = collections
host_key_checking = True
retry_files_enabled = False
# Readable YAML task results (built-in; the community.general.yaml callback was removed).
result_format = yaml
interpreter_python = auto_silent
# Secrets in group_vars/all/vault.yml are ansible-vault encrypted; the password
# lives in .vault_pass (git-ignored, chmod 600 — back it up offline).
vault_password_file = .vault_pass

[privilege_escalation]
become = True
become_method = sudo

---
# Caddy: the only public listener. Installs from the official apt repo and serves
# a placeholder holding page on the domain with automatic TLS. Phase 2+ adds the
# reverse-proxy routes to the MCP/auth services.

- name: Install prerequisites for the Caddy apt repo
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
    state: present
    update_cache: true

- name: Add the Caddy apt signing key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /usr/share/keyrings/caddy-stable-archive-keyring.asc
    mode: "0644"

- name: Add the Caddy apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.asc]
      https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
    filename: caddy-stable
    state: present

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Deploy the holding-page Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: "caddy validate --config %s --adapter caddyfile"
  notify: Reload caddy

- name: Create the holding-page web root
  ansible.builtin.file:
    path: /var/www/intervals_mcp
    state: directory
    owner: caddy
    group: caddy
    mode: "0755"

- name: Deploy the holding page
  ansible.builtin.copy:
    dest: /var/www/intervals_mcp/index.html
    content: |
      <!doctype html>
      <meta charset="utf-8">
      <title>intervals_mcp</title>
      <h1>🪿 intervals_mcp</h1>
      <p>Holding page — services coming online.</p>
    owner: caddy
    group: caddy
    mode: "0644"

- name: Ensure Caddy is enabled and started
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started

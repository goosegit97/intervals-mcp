---
# Deploy the intervals MCP binary as a managed, localhost-bound systemd service
# running as a dedicated, non-login user, with secrets in a 0600 EnvironmentFile.

- name: Create the app bin directory
  ansible.builtin.file:
    path: "{{ app_bin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create the app config directory
  ansible.builtin.file:
    path: "{{ app_etc_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# --- intervals service --------------------------------------------------------
- name: Create the intervals service user (system, no login)
  ansible.builtin.user:
    name: "{{ intervals_service_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    home: "{{ app_prefix }}"
    state: present

- name: Fail if the staged intervals binary is missing
  ansible.builtin.stat:
    path: "{{ role_path }}/files/intervals"
  register: intervals_bin
  delegate_to: localhost
  become: false

- name: Assert the intervals binary was staged
  ansible.builtin.assert:
    that: intervals_bin.stat.exists
    fail_msg: >-
      ansible/roles/app/files/intervals is missing. Build it first:
      `GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o ansible/roles/app/files/intervals ./cmd/intervals`.

- name: Install the intervals binary
  ansible.builtin.copy:
    src: intervals
    dest: "{{ app_bin_dir }}/intervals"
    owner: root
    group: root
    mode: "0755"
  notify: Restart intervals

- name: Install the intervals EnvironmentFile (secrets, 0600)
  ansible.builtin.copy:
    dest: "{{ app_etc_dir }}/intervals.env"
    owner: "{{ intervals_service_user }}"
    group: "{{ intervals_service_user }}"
    mode: "0600"
    content: |
      INTERVALS_LISTEN_ADDR={{ intervals_listen_addr }}
      MCP_BEARER_TOKEN={{ mcp_bearer_token }}
      INTERVALS_API_KEY={{ intervals_api_key }}
      INTERVALS_ATHLETE_ID={{ intervals_athlete_id }}
  no_log: true
  notify: Restart intervals

- name: Install the intervals systemd unit
  ansible.builtin.template:
    src: intervals.service.j2
    dest: /etc/systemd/system/intervals.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart intervals

- name: Enable and start intervals
  ansible.builtin.systemd:
    name: intervals
    enabled: true
    state: started
    daemon_reload: true
